name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test plugin build
        run: mvn test
        working-directory: plugins/embed-views-extractor

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli

      - name: Start devcontainer
        run: devcontainer up --workspace-folder .

      - name: Check default server
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080/ > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          exit 1

      - name: Validate workspace
        run: devcontainer exec --workspace-folder . bin/validate

      - name: Inspect workspace
        run: devcontainer exec --workspace-folder . bin/inspect

      - name: Export workspace
        run: devcontainer exec --workspace-folder . bin/export -f mermaid
