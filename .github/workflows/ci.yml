name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test plugin build
        run: mvn test
        working-directory: plugins/embed-views-extractor

      - name: Build image
        run: docker build --pull -t architecture-model-template .

      - name: Validate workspace
        run: docker run --rm architecture-model-template bin/validate

      - name: Inspect workspace
        run: docker run --rm architecture-model-template bin/inspect

      - name: Export workspace
        run: docker run --rm -e WORKSPACE_PATH=workspace.dsl -e OUTPUT_DIR=output/ architecture-model-template bin/export -f mermaid

      - name: Start local server
        run: |
          container_id=$(docker run -d -p 8080:8080 -e PORT=8080 architecture-model-template bin/local)
          trap 'docker logs "$container_id"; docker stop "$container_id"' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080/ > /dev/null; then
              exit 0
            fi

            if ! docker ps --quiet --filter "id=$container_id" | grep --quiet .; then
              exit 1
            fi

            sleep 2
          done

          exit 1
